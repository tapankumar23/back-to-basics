<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coding Concepts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── Galaxy canvas ── */
    #galaxy-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ── Title ── */
    #page-title {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }
    #page-title h1 {
      font-size: clamp(1.4rem, 2.6vw, 2.4rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 6px;
    }
    #page-title p {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* ── Hint ── */
    #canvas-hint {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: var(--text-muted);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
      pointer-events: none;
      opacity: 0.7;
    }

    /* ── Sidebar toggle ── */
    #sidebar-toggle {
      position: fixed;
      top: 22px;
      right: 22px;
      z-index: 1001;
      border: 1px solid var(--border);
      background: rgba(22,27,34,0.92);
      color: var(--text);
      border-radius: 14px;
      width: 46px;
      height: 46px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      transition: transform 0.2s, background 0.2s;
    }
    #sidebar-toggle:hover {
      transform: translateY(-1px);
      background: rgba(28,35,48,0.98);
    }
    .hamburger-line {
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      transition: transform 0.22s ease, opacity 0.22s ease;
    }
    body.sidebar-open #sidebar-toggle .hamburger-line:nth-child(1) {
      transform: translateY(6px) rotate(45deg);
    }
    body.sidebar-open #sidebar-toggle .hamburger-line:nth-child(2) {
      opacity: 0;
    }
    body.sidebar-open #sidebar-toggle .hamburger-line:nth-child(3) {
      transform: translateY(-6px) rotate(-45deg);
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0;
      margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }

    /* ── Sidebar overlay ── */
    #sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(6,10,16,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      z-index: 1001;
    }
    #sidebar-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Sidebar drawer (slides from right) ── */
    #sidebar-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(300px, 88vw);
      height: 100vh;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0) 18%), #0f141b;
      border-left: 1px solid var(--border);
      box-shadow: -24px 0 50px rgba(0,0,0,0.4);
      padding: 22px 18px 24px;
      transform: translateX(102%);
      transition: transform 0.24s ease;
      z-index: 1002;
      overflow-y: auto;
    }
    #sidebar-drawer.open {
      transform: translateX(0);
    }
    .drawer-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }
    .drawer-heading {
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
    }
    .drawer-kicker {
      color: var(--text-muted);
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 3px;
    }
    .drawer-close {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 999px;
      width: 34px;
      height: 34px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }
    .drawer-close:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.3);
    }
    .drawer-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .drawer-entry {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(48,54,61,0.8);
      background: rgba(22,27,34,0.7);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
    }
    .drawer-entry:hover {
      background: rgba(30,38,50,0.9);
      transform: translateX(-2px);
    }
    .drawer-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .drawer-entry-body {
      flex: 1;
      min-width: 0;
    }
    .drawer-entry-num {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }
    .drawer-entry-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
      line-height: 1.25;
    }
    .drawer-entry-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ── Tooltip ── */
    #node-tooltip {
      position: fixed;
      z-index: 500;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      background: rgba(13,17,23,0.96);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 15px;
      max-width: 230px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    }
    #node-tooltip.visible {
      opacity: 1;
    }
    .tooltip-num {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }
    .tooltip-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
      line-height: 1.2;
    }
    .tooltip-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .tooltip-cta {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      margin-top: 8px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<!-- Title -->
<div id="page-title">
  <h1>Coding Concepts</h1>
  <p>Explore the principles of clean, maintainable code</p>
</div>

<!-- Canvas hint -->
<div id="canvas-hint">Hover a node to preview · Click to open chapter</div>

<!-- Sidebar toggle -->
<button id="sidebar-toggle" type="button" aria-controls="sidebar-drawer" aria-expanded="false" aria-label="Toggle navigation menu">
  <span class="hamburger-line"></span>
  <span class="hamburger-line"></span>
  <span class="hamburger-line"></span>
  <span class="sr-only">Toggle navigation menu</span>
</button>

<!-- Overlay -->
<div id="sidebar-overlay"></div>

<!-- Sidebar drawer -->
<aside id="sidebar-drawer" aria-hidden="true">
  <div class="drawer-top">
    <div>
      <div class="drawer-kicker">Navigation</div>
      <div class="drawer-heading">Coding Concepts</div>
    </div>
    <button class="drawer-close" id="sidebar-close" type="button" aria-label="Close menu">&#215;</button>
  </div>
  <nav class="drawer-nav" id="drawer-nav" aria-label="Coding concepts chapters">
    <!-- entries injected by JS using safe DOM methods -->
  </nav>
</aside>

<!-- Tooltip -->
<div id="node-tooltip" role="tooltip" aria-hidden="true">
  <div class="tooltip-num"></div>
  <div class="tooltip-title"></div>
  <div class="tooltip-desc"></div>
  <div class="tooltip-cta">Click to open &#8594;</div>
</div>

<!-- Full-screen galaxy SVG -->
<svg id="galaxy-canvas" aria-label="Coding concepts constellation map" role="img">
  <defs>
    <filter id="glow-node" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g id="starfield"></g>
  <g id="constellation-lines"></g>
  <g id="nodes-group"></g>
</svg>

<script>
// ─────────────────────────────────────────────
// Data
// ─────────────────────────────────────────────
var NODES = [
  {
    id: 1, num: '01',
    labelLines: ['Clean Code', 'Fundamentals'],
    shortLabel: 'Clean Code Fundamentals',
    accent: '#4ade80',
    file: '01_clean_code_fundamentals.html',
    desc: 'Naming, functions, comments, formatting',
    px: 0.20, py: 0.25
  },
  {
    id: 2, num: '02',
    labelLines: ['SOLID', 'Principles'],
    shortLabel: 'SOLID Principles',
    accent: '#f59e0b',
    file: '02_solid_principles.html',
    desc: 'SRP, OCP, LSP, ISP, DIP',
    px: 0.50, py: 0.30
  },
  {
    id: 3, num: '03',
    labelLines: ['DRY \u00B7 KISS', '\u00B7 YAGNI'],
    shortLabel: 'DRY \u00B7 KISS \u00B7 YAGNI',
    accent: '#a78bfa',
    file: '03_dry_kiss_yagni.html',
    desc: 'Core simplicity principles',
    px: 0.75, py: 0.20
  },
  {
    id: 4, num: '04',
    labelLines: ['OO Design', 'Principles'],
    shortLabel: 'OO Design Principles',
    accent: '#38bdf8',
    file: '04_oo_design_principles.html',
    desc: 'Composition, Demeter, CQS, POLA',
    px: 0.70, py: 0.50
  },
  {
    id: 5, num: '05',
    labelLines: ['Code', 'Smells'],
    shortLabel: 'Code Smells',
    accent: '#f472b6',
    file: '05_code_smells.html',
    desc: 'God Class, Feature Envy, Deep Nesting\u2026',
    px: 0.65, py: 0.70
  },
  {
    id: 6, num: '06',
    labelLines: ['Refactoring', 'Patterns'],
    shortLabel: 'Refactoring Patterns',
    accent: '#fb923c',
    file: '06_refactoring_patterns.html',
    desc: 'Extract Method, Guard Clauses, Move Method\u2026',
    px: 0.45, py: 0.75
  },
  {
    id: 7, num: '07',
    labelLines: ['Defensive', '& Advanced'],
    shortLabel: 'Defensive & Advanced',
    accent: '#34d399',
    file: '07_defensive_and_advanced.html',
    desc: 'SoC, DI/IoC, Design by Contract',
    px: 0.25, py: 0.65
  }
];

// Constellation edges: [nodeId1, nodeId2]
var EDGES = [
  [1, 2], // clean code informs SOLID
  [2, 3], // SOLID informs DRY/KISS discipline
  [2, 4], // SOLID and OO design are siblings
  [4, 5], // OO violations = code smells
  [5, 6], // smells diagnosed -> refactoring prescribed
  [2, 7], // DIP enables IoC/DI
  [1, 7]  // clean code fundamentals underpin all
];

// ─────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────
function hexToRgb(hex) {
  return {
    r: parseInt(hex.slice(1,3), 16),
    g: parseInt(hex.slice(3,5), 16),
    b: parseInt(hex.slice(5,7), 16)
  };
}

function svgEl(tag) {
  return document.createElementNS('http://www.w3.org/2000/svg', tag);
}

function nodeCoords(node) {
  var topPad = 110;
  var bottomPad = 60;
  var usableH = window.innerHeight - topPad - bottomPad;
  return {
    x: node.px * window.innerWidth,
    y: topPad + node.py * usableH
  };
}

// ─────────────────────────────────────────────
// Star field
// ─────────────────────────────────────────────
function buildStarField() {
  var g = document.getElementById('starfield');
  while (g.firstChild) { g.removeChild(g.firstChild); }

  var W = window.innerWidth;
  var H = window.innerHeight;

  for (var i = 0; i < 160; i++) {
    var cx = Math.random() * W;
    var cy = Math.random() * H;
    var r  = 0.4 + Math.random() * 1.2;
    var op = 0.12 + Math.random() * 0.55;
    var twinkle = Math.random() < 0.35;

    var c = svgEl('circle');
    c.setAttribute('cx', cx);
    c.setAttribute('cy', cy);
    c.setAttribute('r', r);
    c.setAttribute('fill', 'white');
    c.setAttribute('opacity', op);
    if (twinkle) { c.classList.add('star-twinkle'); }
    g.appendChild(c);
  }

  // Twinkle via anime.js
  var twinklers = g.querySelectorAll('.star-twinkle');
  twinklers.forEach(function(star) {
    var baseOp = parseFloat(star.getAttribute('opacity'));
    anime({
      targets: star,
      opacity: [baseOp, baseOp * 0.2, baseOp],
      duration: 2200 + Math.random() * 3000,
      delay: Math.random() * 4000,
      loop: true,
      easing: 'easeInOutSine',
      direction: 'alternate'
    });
  });
}

// ─────────────────────────────────────────────
// Constellation lines
// ─────────────────────────────────────────────
function buildConstellationLines() {
  var g = document.getElementById('constellation-lines');
  while (g.firstChild) { g.removeChild(g.firstChild); }

  var nodeById = {};
  NODES.forEach(function(n) { nodeById[n.id] = n; });

  EDGES.forEach(function(edge, idx) {
    var n1 = nodeById[edge[0]];
    var n2 = nodeById[edge[1]];
    var c1 = nodeCoords(n1);
    var c2 = nodeCoords(n2);
    var x1 = c1.x, y1 = c1.y, x2 = c2.x, y2 = c2.y;
    var totalLen = Math.hypot(x2 - x1, y2 - y1);

    // Glow line
    var glow = svgEl('line');
    glow.setAttribute('x1', x1); glow.setAttribute('y1', y1);
    glow.setAttribute('x2', x2); glow.setAttribute('y2', y2);
    glow.setAttribute('stroke', '#e6edf3');
    glow.setAttribute('stroke-width', '5');
    glow.setAttribute('opacity', '0.05');
    glow.setAttribute('stroke-linecap', 'round');
    glow.style.filter = 'blur(3px)';
    g.appendChild(glow);

    // Main line
    var line = svgEl('line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#e6edf3');
    line.setAttribute('stroke-width', '1');
    line.setAttribute('opacity', '0.2');
    line.setAttribute('stroke-linecap', 'round');
    line.setAttribute('stroke-dasharray', totalLen);
    line.setAttribute('stroke-dashoffset', totalLen);
    line.classList.add('const-line');
    g.appendChild(line);

    // Draw-in entrance
    anime({
      targets: line,
      strokeDashoffset: [totalLen, 0],
      duration: 900,
      delay: 400 + idx * 110,
      easing: 'easeOutCubic'
    });

    // Slow drift after entrance
    setTimeout(function(l, len, i2) {
      return function() {
        anime({
          targets: l,
          strokeDashoffset: [-(len * 0.08), len * 0.08],
          duration: 6000 + i2 * 700,
          loop: true,
          direction: 'alternate',
          easing: 'easeInOutSine'
        });
      };
    }(line, totalLen, idx), 1500 + idx * 110);
  });
}

// ─────────────────────────────────────────────
// Nodes
// ─────────────────────────────────────────────
var NODE_R  = 28;
var BADGE_R = 11;
var BG_COLOR = '#0d1117';
var tooltip = document.getElementById('node-tooltip');

function buildNodes() {
  var g = document.getElementById('nodes-group');
  while (g.firstChild) { g.removeChild(g.firstChild); }

  NODES.forEach(function(node, idx) {
    var pos = nodeCoords(node);
    var x = pos.x, y = pos.y;
    var rgb = hexToRgb(node.accent);

    var group = svgEl('g');
    group.setAttribute('class', 'node-group');
    group.setAttribute('data-id', node.id);
    group.style.cursor = 'pointer';
    group.style.opacity = '0';

    // Halo ring
    var halo = svgEl('circle');
    halo.setAttribute('cx', x);
    halo.setAttribute('cy', y);
    halo.setAttribute('r', NODE_R + 14);
    halo.setAttribute('fill', 'none');
    halo.setAttribute('stroke', node.accent);
    halo.setAttribute('stroke-width', '1');
    halo.setAttribute('opacity', '0.12');
    halo.classList.add('node-halo');
    group.appendChild(halo);

    // Main filled circle
    var circle = svgEl('circle');
    circle.setAttribute('cx', x);
    circle.setAttribute('cy', y);
    circle.setAttribute('r', NODE_R);
    circle.setAttribute('fill', 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',0.18)');
    circle.setAttribute('stroke', node.accent);
    circle.setAttribute('stroke-width', '2');
    circle.classList.add('node-circle');
    group.appendChild(circle);

    // Label lines below the circle
    var lineH  = 13;
    var labelY = y + NODE_R + 16;
    node.labelLines.forEach(function(line, li) {
      var t = svgEl('text');
      t.setAttribute('x', x);
      t.setAttribute('y', labelY + li * lineH);
      t.setAttribute('text-anchor', 'middle');
      t.setAttribute('fill', '#e6edf3');
      t.setAttribute('font-family', 'Inter, sans-serif');
      t.setAttribute('font-size', '11');
      t.setAttribute('font-weight', '600');
      t.style.pointerEvents = 'none';
      t.textContent = line;
      group.appendChild(t);
    });

    // Number badge (top-right)
    var badgeCx = x + NODE_R * 0.72;
    var badgeCy = y - NODE_R * 0.72;

    var badge = svgEl('circle');
    badge.setAttribute('cx', badgeCx);
    badge.setAttribute('cy', badgeCy);
    badge.setAttribute('r', BADGE_R);
    badge.setAttribute('fill', node.accent);
    badge.setAttribute('stroke', BG_COLOR);
    badge.setAttribute('stroke-width', '2');
    group.appendChild(badge);

    var badgeTxt = svgEl('text');
    badgeTxt.setAttribute('x', badgeCx);
    badgeTxt.setAttribute('y', badgeCy + 4);
    badgeTxt.setAttribute('text-anchor', 'middle');
    badgeTxt.setAttribute('fill', '#0d1117');
    badgeTxt.setAttribute('font-family', 'JetBrains Mono, monospace');
    badgeTxt.setAttribute('font-size', '9');
    badgeTxt.setAttribute('font-weight', '600');
    badgeTxt.style.pointerEvents = 'none';
    badgeTxt.textContent = node.num;
    group.appendChild(badgeTxt);

    // Transparent hit area
    var totalLabelH = node.labelLines.length * lineH + 10;
    var hit = svgEl('rect');
    hit.setAttribute('x', x - NODE_R - 10);
    hit.setAttribute('y', y - NODE_R - 10);
    hit.setAttribute('width', (NODE_R + 10) * 2);
    hit.setAttribute('height', NODE_R * 2 + 20 + totalLabelH);
    hit.setAttribute('fill', 'transparent');
    hit.setAttribute('stroke', 'none');
    group.appendChild(hit);

    // Interaction
    (function(nd, c, h) {
      group.addEventListener('mouseenter', function(e) {
        var r2 = hexToRgb(nd.accent);
        c.style.filter = 'drop-shadow(0 0 10px ' + nd.accent + ')';
        anime.remove(c);
        anime({
          targets: c,
          duration: 200,
          easing: 'easeOutQuad',
          update: function(anim) {
            var p = anim.progress / 100;
            c.setAttribute('fill', 'rgba(' + r2.r + ',' + r2.g + ',' + r2.b + ',' + (0.18 + p * 0.22) + ')');
            c.setAttribute('stroke-width', 2 + p * 1.5);
          }
        });
        showTooltip(nd);
        positionTooltip(e);
      });
      group.addEventListener('mousemove', positionTooltip);
      group.addEventListener('mouseleave', function() {
        var r2 = hexToRgb(nd.accent);
        c.style.filter = '';
        anime.remove(c);
        anime({
          targets: c,
          duration: 250,
          easing: 'easeOutQuad',
          update: function(anim) {
            var p = 1 - anim.progress / 100;
            c.setAttribute('fill', 'rgba(' + r2.r + ',' + r2.g + ',' + r2.b + ',' + (0.18 + p * 0.22) + ')');
            c.setAttribute('stroke-width', 2 + p * 1.5);
          }
        });
        hideTooltip();
      });
      group.addEventListener('click', function() {
        window.location.href = nd.file;
      });
    }(node, circle, halo));

    g.appendChild(group);
  });

  // Entrance animation
  anime({
    targets: '.node-group',
    opacity: [0, 1],
    translateY: [20, 0],
    delay: anime.stagger(80, { start: 200 }),
    duration: 700,
    easing: 'easeOutCubic'
  });

  // Halo pulse
  setTimeout(function() {
    anime({
      targets: '.node-halo',
      opacity: [0.1, 0.22, 0.1],
      duration: 3200,
      delay: anime.stagger(450),
      loop: true,
      easing: 'easeInOutSine'
    });
  }, 900);
}

// ─────────────────────────────────────────────
// Tooltip
// ─────────────────────────────────────────────
function showTooltip(node) {
  var numEl   = tooltip.querySelector('.tooltip-num');
  var titleEl = tooltip.querySelector('.tooltip-title');
  var descEl  = tooltip.querySelector('.tooltip-desc');
  numEl.textContent   = node.num;
  numEl.style.color   = node.accent;
  titleEl.textContent = node.shortLabel;
  descEl.textContent  = node.desc;
  tooltip.classList.add('visible');
  tooltip.setAttribute('aria-hidden', 'false');
}

function positionTooltip(e) {
  var W  = window.innerWidth;
  var H  = window.innerHeight;
  var tw = 240;
  var th = 110;
  var left = e.clientX + 18;
  var top  = e.clientY - 20;
  if (left + tw > W - 10) { left = e.clientX - tw - 14; }
  if (top + th > H - 10)  { top  = H - th - 10; }
  tooltip.style.left = left + 'px';
  tooltip.style.top  = top  + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
  tooltip.setAttribute('aria-hidden', 'true');
}

// ─────────────────────────────────────────────
// Sidebar (built with safe DOM methods only)
// ─────────────────────────────────────────────
function buildSidebar() {
  var nav = document.getElementById('drawer-nav');
  while (nav.firstChild) { nav.removeChild(nav.firstChild); }

  NODES.forEach(function(node) {
    var entry = document.createElement('a');
    entry.className = 'drawer-entry';
    entry.href = node.file;

    var dot = document.createElement('div');
    dot.className = 'drawer-dot';
    dot.style.background = node.accent;
    dot.style.boxShadow  = '0 0 6px ' + node.accent;

    var body = document.createElement('div');
    body.className = 'drawer-entry-body';

    var numDiv = document.createElement('div');
    numDiv.className = 'drawer-entry-num';
    numDiv.textContent = 'Chapter ' + node.num;

    var titleDiv = document.createElement('div');
    titleDiv.className = 'drawer-entry-title';
    titleDiv.textContent = node.shortLabel;

    var descDiv = document.createElement('div');
    descDiv.className = 'drawer-entry-desc';
    descDiv.textContent = node.desc;

    body.appendChild(numDiv);
    body.appendChild(titleDiv);
    body.appendChild(descDiv);

    entry.appendChild(dot);
    entry.appendChild(body);

    entry.addEventListener('click', function() { setSidebarState(false); });
    nav.appendChild(entry);
  });
}

// ─────────────────────────────────────────────
// Sidebar toggle
// ─────────────────────────────────────────────
var sidebarToggle  = document.getElementById('sidebar-toggle');
var sidebarDrawer  = document.getElementById('sidebar-drawer');
var sidebarOverlay = document.getElementById('sidebar-overlay');
var sidebarClose   = document.getElementById('sidebar-close');

function setSidebarState(open) {
  document.body.classList.toggle('sidebar-open', open);
  sidebarDrawer.classList.toggle('open', open);
  sidebarOverlay.classList.toggle('open', open);
  sidebarDrawer.setAttribute('aria-hidden', String(!open));
  sidebarToggle.setAttribute('aria-expanded', String(open));
}

sidebarToggle.addEventListener('click', function() {
  setSidebarState(!sidebarDrawer.classList.contains('open'));
});
sidebarClose.addEventListener('click', function() { setSidebarState(false); });
sidebarOverlay.addEventListener('click', function() { setSidebarState(false); });
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && sidebarDrawer.classList.contains('open')) {
    setSidebarState(false);
  }
});

// ─────────────────────────────────────────────
// Init + resize
// ─────────────────────────────────────────────
function init() {
  buildSidebar();
  buildStarField();
  buildConstellationLines();
  buildNodes();
}

var resizeTimer;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function() {
    buildStarField();
    buildConstellationLines();
    buildNodes();
  }, 120);
});

init();
</script>
</body>
</html>
