<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coding Concepts — Mind Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --bg-card-hover: #1c2330;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* Subtle dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(48,54,61,0.55) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Mindmap layer ── */
    #mindmap-container {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #lines-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    /* ── Central node ── */
    #central-wrapper {
      position: absolute;
      z-index: 10;
      transform: translate(-50%, -50%);
    }

    #central-node {
      width: 124px;
      height: 124px;
      border-radius: 50%;
      background: rgba(18,24,32,0.97);
      border: 2px solid rgba(230,237,243,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      opacity: 0;
    }

    #central-node::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(230,237,243,0.07);
      animation: ring-pulse 3.5s ease-in-out infinite;
    }

    @keyframes ring-pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.06); }
    }

    #central-node.pulsing {
      animation: node-scale-pulse 3.5s ease-in-out infinite;
    }

    @keyframes node-scale-pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.04); }
    }

    .central-icon {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      color: rgba(230,237,243,0.38);
      margin-bottom: 7px;
      letter-spacing: -0.04em;
    }

    .central-label {
      font-size: 11.5px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .central-sub {
      font-size: 8.5px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      margin-top: 5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Card wrapper — handles absolute positioning + entrance opacity ── */
    .card-wrapper {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 10;
      opacity: 0;
    }

    /* ── Branch card ── */
    .branch-card {
      display: block;
      width: 164px;
      background: rgba(22,27,34,0.93);
      border: 1px solid rgba(48,54,61,0.9);
      border-radius: 14px;
      padding: 13px 14px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: background 0.2s, transform 0.22s, border-color 0.2s;
    }

    .branch-card:hover {
      background: var(--bg-card-hover);
      transform: translateY(-4px);
    }

    .branch-card:focus-visible {
      outline: 2px solid rgba(230,237,243,0.5);
      outline-offset: 3px;
    }

    .card-accent-bar {
      height: 2px;
      border-radius: 999px;
      margin-bottom: 11px;
      opacity: 0.75;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 9px;
    }

    .card-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 999px;
      color: #0d1117;
      flex-shrink: 0;
      line-height: 1.5;
    }

    .card-title {
      font-size: 11.5px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .card-tag {
      font-size: 8.5px;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--text-muted);
      background: rgba(48,54,61,0.5);
      border: 1px solid rgba(48,54,61,0.8);
    }

    /* ── Page title ── */
    #page-title {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }

    #page-title h1 {
      font-size: clamp(1.2rem, 2.2vw, 2rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
      line-height: 1;
    }

    #page-title p {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* ── Hint ── */
    #canvas-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      color: var(--text-muted);
      font-size: 10.5px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
      pointer-events: none;
      opacity: 0.55;
    }

    /* ── Sidebar toggle ── */
    #sidebar-toggle {
      position: fixed;
      top: 22px;
      right: 22px;
      z-index: 1001;
      border: 1px solid var(--border);
      background: rgba(22,27,34,0.92);
      color: var(--text);
      border-radius: 14px;
      width: 44px;
      height: 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      transition: transform 0.2s, background 0.2s;
    }

    #sidebar-toggle:hover { transform: translateY(-1px); background: rgba(28,35,48,0.98); }
    #sidebar-toggle:focus-visible { outline: 2px solid var(--text-muted); outline-offset: 2px; }

    .hamburger-line {
      width: 16px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      transition: transform 0.22s ease, opacity 0.22s ease;
    }

    body.sidebar-open #sidebar-toggle .hamburger-line:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    body.sidebar-open #sidebar-toggle .hamburger-line:nth-child(2) { opacity: 0; }
    body.sidebar-open #sidebar-toggle .hamburger-line:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0;
      margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }

    /* ── Sidebar overlay ── */
    #sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(6,10,16,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      z-index: 1001;
    }

    #sidebar-overlay.open { opacity: 1; pointer-events: auto; }

    /* ── Sidebar drawer ── */
    #sidebar-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(300px, 88vw);
      height: 100vh;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0) 18%), #0f141b;
      border-left: 1px solid var(--border);
      box-shadow: -24px 0 50px rgba(0,0,0,0.4);
      padding: 22px 18px 24px;
      transform: translateX(102%);
      transition: transform 0.24s ease;
      z-index: 1002;
      overflow-y: auto;
    }

    #sidebar-drawer.open { transform: translateX(0); }

    .drawer-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }

    .drawer-heading { color: var(--text); font-size: 16px; font-weight: 700; }

    .drawer-kicker {
      color: var(--text-muted);
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 3px;
    }

    .drawer-close {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 999px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }

    .drawer-close:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
    .drawer-close:focus-visible { outline: 2px solid var(--text-muted); outline-offset: 2px; }

    .drawer-nav { display: flex; flex-direction: column; gap: 8px; }

    .drawer-entry {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 11px 13px;
      border-radius: 12px;
      border: 1px solid rgba(48,54,61,0.8);
      background: rgba(22,27,34,0.7);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: background 0.18s, transform 0.18s;
    }

    .drawer-entry:hover { background: rgba(30,38,50,0.9); transform: translateX(-2px); }

    .drawer-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

    .drawer-entry-body { flex: 1; min-width: 0; }

    .drawer-entry-num {
      font-size: 9.5px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }

    .drawer-entry-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; line-height: 1.25; }
    .drawer-entry-desc  { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  </style>
</head>
<body>

<!-- Title -->
<div id="page-title">
  <h1>Coding Concepts</h1>
  <p>Mind map — click any node to explore</p>
</div>

<!-- Hint -->
<div id="canvas-hint">Hover a card to highlight branch &middot; Click to open chapter</div>

<!-- Sidebar toggle -->
<button id="sidebar-toggle" type="button" aria-controls="sidebar-drawer" aria-expanded="false" aria-label="Toggle navigation menu">
  <span class="hamburger-line"></span>
  <span class="hamburger-line"></span>
  <span class="hamburger-line"></span>
  <span class="sr-only">Toggle navigation menu</span>
</button>

<!-- Overlay -->
<div id="sidebar-overlay"></div>

<!-- Sidebar drawer -->
<aside id="sidebar-drawer" aria-hidden="true">
  <div class="drawer-top">
    <div>
      <div class="drawer-kicker">Navigation</div>
      <div class="drawer-heading">Coding Concepts</div>
    </div>
    <button class="drawer-close" id="sidebar-close" type="button" aria-label="Close menu">&#215;</button>
  </div>
  <nav class="drawer-nav" id="drawer-nav" aria-label="Coding concepts chapters"></nav>
</aside>

<!-- Mindmap -->
<div id="mindmap-container">
  <svg id="lines-svg" aria-hidden="true">
    <defs>
      <filter id="glow-filter" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g id="branches-g"></g>
  </svg>

  <div id="central-wrapper">
    <div id="central-node" role="img" aria-label="Coding Concepts root node">
      <div class="central-icon">&lt;/&gt;</div>
      <div class="central-label">Coding<br>Concepts</div>
      <div class="central-sub">7 chapters</div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// Data
// ─────────────────────────────────────────────────────────
var NODES = [
  {
    id: 1, num: '01',
    title: 'Clean Code\nFundamentals',
    accent: '#4ade80',
    file: '01_clean_code_fundamentals.html',
    desc: 'Naming, functions, comments, formatting',
    tags: ['Naming', 'Functions', 'Comments', 'Formatting']
  },
  {
    id: 2, num: '02',
    title: 'SOLID\nPrinciples',
    accent: '#f59e0b',
    file: '02_solid_principles.html',
    desc: 'SRP, OCP, LSP, ISP, DIP',
    tags: ['SRP', 'OCP', 'LSP', 'ISP', 'DIP']
  },
  {
    id: 3, num: '03',
    title: 'DRY \u00B7 KISS\n\u00B7 YAGNI',
    accent: '#a78bfa',
    file: '03_dry_kiss_yagni.html',
    desc: 'Core simplicity principles',
    tags: ['DRY', 'KISS', 'YAGNI', 'Boy Scout']
  },
  {
    id: 4, num: '04',
    title: 'OO Design\nPrinciples',
    accent: '#38bdf8',
    file: '04_oo_design_principles.html',
    desc: 'Composition, Demeter, CQS, POLA',
    tags: ['Composition', 'Demeter', 'CQS', 'POLA']
  },
  {
    id: 5, num: '05',
    title: 'Code Smells',
    accent: '#f472b6',
    file: '05_code_smells.html',
    desc: 'God Class, Feature Envy, Deep Nesting\u2026',
    tags: ['God Class', 'Envy', 'Deep Nesting']
  },
  {
    id: 6, num: '06',
    title: 'Refactoring\nPatterns',
    accent: '#fb923c',
    file: '06_refactoring_patterns.html',
    desc: 'Extract Method, Guard Clauses, Move Method',
    tags: ['Extract', 'Guard Clauses', 'Move Method']
  },
  {
    id: 7, num: '07',
    title: 'Defensive\n& Advanced',
    accent: '#34d399',
    file: '07_defensive_and_advanced.html',
    desc: 'SoC, DI/IoC, Design by Contract',
    tags: ['SoC', 'DI / IoC', 'Design by Contract']
  }
];

// ─────────────────────────────────────────────────────────
// Layout
// ─────────────────────────────────────────────────────────
function getLayout() {
  var W = window.innerWidth;
  var H = window.innerHeight;
  var topPad = 84;
  var cx = W / 2;
  var cy = topPad + (H - topPad) / 2;
  var R = Math.min(W * 0.36, (H - topPad) * 0.43, 295);
  return { W: W, H: H, cx: cx, cy: cy, R: R };
}

function nodePositions(layout) {
  return NODES.map(function(_, idx) {
    var angle = -Math.PI / 2 + idx * (2 * Math.PI / NODES.length);
    return {
      x: layout.cx + layout.R * Math.cos(angle),
      y: layout.cy + layout.R * Math.sin(angle),
      angle: angle
    };
  });
}

// ─────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────
function svgEl(tag) {
  return document.createElementNS('http://www.w3.org/2000/svg', tag);
}

function bezierPath(x1, y1, x2, y2) {
  var dx = x2 - x1, dy = y2 - y1;
  var len = Math.hypot(dx, dy);
  if (len === 0) { return 'M ' + x1 + ' ' + y1; }
  var nx = dx / len, ny = dy / len;
  // Perpendicular vector for gentle S-curve
  var px = -ny, py = nx;
  var tension = len * 0.36;
  var swing   = len * 0.1;
  var cp1x = x1 + nx * tension + px * swing;
  var cp1y = y1 + ny * tension + py * swing;
  var cp2x = x2 - nx * tension - px * swing;
  var cp2y = y2 - ny * tension - py * swing;
  return 'M ' + x1 + ' ' + y1 + ' C ' + cp1x + ' ' + cp1y + ' ' + cp2x + ' ' + cp2y + ' ' + x2 + ' ' + y2;
}

// ─────────────────────────────────────────────────────────
// Build branches (SVG paths)
// ─────────────────────────────────────────────────────────
function buildLines(layout, positions) {
  var g = document.getElementById('branches-g');
  while (g.firstChild) { g.removeChild(g.firstChild); }

  var CENTRAL_R = 62;

  positions.forEach(function(pos, idx) {
    var node = NODES[idx];
    var angle = pos.angle;
    var sx = layout.cx + CENTRAL_R * Math.cos(angle);
    var sy = layout.cy + CENTRAL_R * Math.sin(angle);
    var d = bezierPath(sx, sy, pos.x, pos.y);
    var approxLen = Math.hypot(pos.x - sx, pos.y - sy) * 1.15;

    // Glow layer
    var glow = svgEl('path');
    glow.setAttribute('d', d);
    glow.setAttribute('stroke', node.accent);
    glow.setAttribute('stroke-width', '9');
    glow.setAttribute('fill', 'none');
    glow.setAttribute('opacity', '0.07');
    glow.style.filter = 'blur(5px)';
    glow.classList.add('branch-glow');
    glow.dataset.idx = idx;
    g.appendChild(glow);

    // Main line
    var path = svgEl('path');
    path.setAttribute('d', d);
    path.setAttribute('stroke', node.accent);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('fill', 'none');
    path.setAttribute('opacity', '0.38');
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('stroke-dasharray', approxLen);
    path.setAttribute('stroke-dashoffset', approxLen);
    path.classList.add('branch-path');
    path.dataset.idx = idx;
    g.appendChild(path);

    // Draw-in animation
    anime({
      targets: path,
      strokeDashoffset: [approxLen, 0],
      duration: 700,
      delay: 240 + idx * 75,
      easing: 'easeOutCubic'
    });

    // End dot at card center
    var dot = svgEl('circle');
    dot.setAttribute('cx', pos.x);
    dot.setAttribute('cy', pos.y);
    dot.setAttribute('r', '4');
    dot.setAttribute('fill', node.accent);
    dot.setAttribute('opacity', '0');
    dot.classList.add('branch-dot');
    dot.dataset.idx = idx;
    g.appendChild(dot);

    anime({
      targets: dot,
      opacity: [0, 0.55],
      duration: 300,
      delay: 800 + idx * 75,
      easing: 'easeOutCubic'
    });
  });
}

// ─────────────────────────────────────────────────────────
// Build cards (HTML, positioned via wrapper)
// ─────────────────────────────────────────────────────────
function buildCards(layout, positions) {
  document.querySelectorAll('.card-wrapper').forEach(function(el) { el.remove(); });
  var container = document.getElementById('mindmap-container');

  positions.forEach(function(pos, idx) {
    var node = NODES[idx];

    // Wrapper handles position + entrance opacity
    var wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper';
    wrapper.style.left = pos.x + 'px';
    wrapper.style.top  = pos.y + 'px';

    // Card
    var card = document.createElement('a');
    card.className = 'branch-card';
    card.href = node.file;

    // Accent bar
    var bar = document.createElement('div');
    bar.className = 'card-accent-bar';
    bar.style.background = node.accent;
    card.appendChild(bar);

    // Header: num badge + title
    var header = document.createElement('div');
    header.className = 'card-header';

    var num = document.createElement('span');
    num.className = 'card-num';
    num.textContent = node.num;
    num.style.background = node.accent;
    header.appendChild(num);

    var title = document.createElement('div');
    title.className = 'card-title';
    node.title.split('\n').forEach(function(line, li) {
      if (li > 0) { title.appendChild(document.createElement('br')); }
      title.appendChild(document.createTextNode(line));
    });
    header.appendChild(title);
    card.appendChild(header);

    // Tags
    var tags = document.createElement('div');
    tags.className = 'card-tags';
    node.tags.forEach(function(tagText) {
      var tag = document.createElement('span');
      tag.className = 'card-tag';
      tag.textContent = tagText;
      tags.appendChild(tag);
    });
    card.appendChild(tags);

    // Hover: brighten branch + glow
    (function(i) {
      card.addEventListener('mouseenter', function() {
        document.querySelectorAll('.branch-path').forEach(function(p) {
          anime({ targets: p, opacity: parseInt(p.dataset.idx) === i ? 0.88 : 0.18, duration: 180, easing: 'easeOutQuad' });
        });
        document.querySelectorAll('.branch-glow').forEach(function(g) {
          anime({ targets: g, opacity: parseInt(g.dataset.idx) === i ? 0.2 : 0.04, duration: 180, easing: 'easeOutQuad' });
        });
        document.querySelectorAll('.branch-dot').forEach(function(d) {
          anime({ targets: d, opacity: parseInt(d.dataset.idx) === i ? 0.9 : 0.2, duration: 180, easing: 'easeOutQuad' });
        });
      });
      card.addEventListener('mouseleave', function() {
        document.querySelectorAll('.branch-path').forEach(function(p) {
          anime({ targets: p, opacity: 0.38, duration: 280, easing: 'easeOutQuad' });
        });
        document.querySelectorAll('.branch-glow').forEach(function(g) {
          anime({ targets: g, opacity: 0.07, duration: 280, easing: 'easeOutQuad' });
        });
        document.querySelectorAll('.branch-dot').forEach(function(d) {
          anime({ targets: d, opacity: 0.55, duration: 280, easing: 'easeOutQuad' });
        });
      });
    }(idx));

    wrapper.appendChild(card);
    container.appendChild(wrapper);

    // Entrance animation — opacity only on wrapper (card uses transform for hover)
    anime({
      targets: wrapper,
      opacity: [0, 1],
      duration: 480,
      delay: 560 + idx * 75,
      easing: 'easeOutCubic'
    });
  });
}

// ─────────────────────────────────────────────────────────
// Sidebar
// ─────────────────────────────────────────────────────────
function buildSidebar() {
  var nav = document.getElementById('drawer-nav');
  while (nav.firstChild) { nav.removeChild(nav.firstChild); }

  NODES.forEach(function(node) {
    var entry = document.createElement('a');
    entry.className = 'drawer-entry';
    entry.href = node.file;

    var dot = document.createElement('div');
    dot.className = 'drawer-dot';
    dot.style.background = node.accent;
    dot.style.boxShadow  = '0 0 6px ' + node.accent;

    var body = document.createElement('div');
    body.className = 'drawer-entry-body';

    var numDiv = document.createElement('div');
    numDiv.className = 'drawer-entry-num';
    numDiv.textContent = 'Chapter ' + node.num;

    var titleDiv = document.createElement('div');
    titleDiv.className = 'drawer-entry-title';
    titleDiv.textContent = node.title.replace('\n', ' ');

    var descDiv = document.createElement('div');
    descDiv.className = 'drawer-entry-desc';
    descDiv.textContent = node.desc;

    body.appendChild(numDiv);
    body.appendChild(titleDiv);
    body.appendChild(descDiv);
    entry.appendChild(dot);
    entry.appendChild(body);
    entry.addEventListener('click', function() { setSidebarState(false); });
    nav.appendChild(entry);
  });
}

// ─────────────────────────────────────────────────────────
// Sidebar toggle
// ─────────────────────────────────────────────────────────
var sidebarToggle  = document.getElementById('sidebar-toggle');
var sidebarDrawer  = document.getElementById('sidebar-drawer');
var sidebarOverlay = document.getElementById('sidebar-overlay');
var sidebarClose   = document.getElementById('sidebar-close');

function setSidebarState(open) {
  document.body.classList.toggle('sidebar-open', open);
  sidebarDrawer.classList.toggle('open', open);
  sidebarOverlay.classList.toggle('open', open);
  sidebarDrawer.setAttribute('aria-hidden', String(!open));
  sidebarToggle.setAttribute('aria-expanded', String(open));
}

sidebarToggle.addEventListener('click', function() {
  setSidebarState(!sidebarDrawer.classList.contains('open'));
});
sidebarClose.addEventListener('click',   function() { setSidebarState(false); });
sidebarOverlay.addEventListener('click', function() { setSidebarState(false); });
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && sidebarDrawer.classList.contains('open')) { setSidebarState(false); }
});

// ─────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────
function init() {
  var layout = getLayout();
  var positions = nodePositions(layout);

  // Position central wrapper
  var cw = document.getElementById('central-wrapper');
  cw.style.left = layout.cx + 'px';
  cw.style.top  = layout.cy + 'px';

  buildSidebar();
  buildLines(layout, positions);
  buildCards(layout, positions);

  // Fade in central node, then start pulse
  anime({
    targets: '#central-node',
    opacity: [0, 1],
    duration: 450,
    delay: 100,
    easing: 'easeOutCubic',
    complete: function() {
      document.getElementById('central-node').classList.add('pulsing');
    }
  });
}

// ─────────────────────────────────────────────────────────
// Resize
// ─────────────────────────────────────────────────────────
var resizeTimer;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function() {
    var layout = getLayout();
    var positions = nodePositions(layout);
    var cw = document.getElementById('central-wrapper');
    cw.style.left = layout.cx + 'px';
    cw.style.top  = layout.cy + 'px';
    buildLines(layout, positions);
    buildCards(layout, positions);
  }, 150);
});

init();
</script>
</body>
